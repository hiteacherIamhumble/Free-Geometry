# ETH3D Multi-View Benchmark Configuration
#
# Evaluates pose and recon_unposed metrics on ETH3D with varying number of views.
# Run separately for each view count: 2, 4, 8, 16
#
# Usage:
#   python -m depth_anything_3.bench.evaluator \
#       --config src/depth_anything_3/bench/configs/eval_eth3d_multiview.yaml \
#       model.path=$MODEL \
#       eval.max_frames=2   # Change to 2, 4, 8, or 16

model:
  path: depth-anything/DA3-GIANT

workspace:
  work_dir: ./workspace/evaluation_eth3d_multiview

eval:
  datasets:
    - eth3d

  modes:
    - pose
    - recon_unposed

  ref_view_strategy: "first"

  # All ETH3D scenes
  scenes: null

  # Set this via CLI: eval.max_frames=2, 4, 8, or 16
  max_frames: 16

  eval_only: false
  print_only: false

inference:
  num_fusion_workers: 4
  debug: false
