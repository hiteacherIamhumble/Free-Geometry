# ScanNet++ Multi-View Benchmark Configuration
#
# Evaluates pose and recon_unposed metrics on ScanNet++ with varying number of views.
# Run separately for each view count: 4, 8
#
# Usage:
#   python -m depth_anything_3.bench.evaluator \
#       --config src/depth_anything_3/bench/configs/eval_scannetpp_multiview.yaml \
#       model.path=$MODEL \
#       eval.max_frames=8   # Change to 4 or 8

model:
  path: depth-anything/DA3-GIANT

workspace:
  work_dir: ./workspace/evaluation_scannetpp_multiview

eval:
  datasets:
    - scannetpp

  modes:
    - pose
    - recon_unposed

  ref_view_strategy: "first"

  # All ScanNet++ scenes (null = all)
  scenes: null

  # Set this via CLI: eval.max_frames=4 or 8
  max_frames: 8

  eval_only: false
  print_only: false

inference:
  num_fusion_workers: 4
  debug: false
