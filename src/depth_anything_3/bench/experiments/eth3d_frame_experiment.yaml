# ETH3D Frame Extraction Experiments Configuration
#
# Runs 3 experiments comparing different frame selection strategies:
# 1. exp1_baseline: Standard 8-frame pipeline
# 2. exp2_4frame: 4-frame [0,2,4,6] direct pass
# 3. exp3_extract4: 8-frame encode -> extract 4-frame features -> predict
#
# Usage:
#   python -m depth_anything_3.bench.experiments.run_experiment \
#       --config src/depth_anything_3/bench/experiments/eth3d_frame_experiment.yaml \
#       model.path=depth-anything/DA3-GIANT

model:
  path: depth-anything/DA3-GIANT

workspace:
  work_dir: ./workspace/frame_experiments

eval:
  datasets:
    - eth3d

  modes:
    - pose
    - recon_unposed

  ref_view_strategy: "first"

  # Specific scenes to evaluate (null = all ETH3D scenes)
  scenes: null

  # Number of input frames (fixed at 8 for these experiments)
  num_frames: 8

  eval_only: false
  print_only: false

inference:
  num_fusion_workers: 4
  debug: false

# Experiment-specific settings (for documentation)
experiments:
  exp1_baseline:
    description: "8-frame standard pipeline (baseline)"
    input_frames: [0, 1, 2, 3, 4, 5, 6, 7]
    output_frames: [0, 1, 2, 3, 4, 5, 6, 7]

  exp2_4frame:
    description: "4-frame [0,2,4,6] direct pass through pipeline"
    input_frames: [0, 2, 4, 6]
    output_frames: [0, 2, 4, 6]

  exp3_extract4:
    description: "8-frame encode -> extract [0,2,4,6] features -> predict"
    input_frames: [0, 1, 2, 3, 4, 5, 6, 7]
    output_frames: [0, 2, 4, 6]
